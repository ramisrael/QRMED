<!DOCTYPE html>
<html>
<head>
  <title>Perfil Médico</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow-lg text-center">

    <h2>Información Médica</h2>
    <div id="info"></div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDHrG-U9JEwo-AesKD6CCNDDgXZ_lB3Z14",
  authDomain: "web-medica-49502.firebaseapp.com",
  databaseURL: "https://web-medica-49502-default-rtdb.firebaseio.com",
  projectId: "web-medica-49502",
  storageBucket: "web-medica-49502.firebasestorage.app",
  messagingSenderId: "297387802420",
  appId: "1:297387802420:web:c3afc54720d20ba44d6f61"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const params = new URLSearchParams(window.location.search);
let id = params.get("id");

db.ref("usuarios/" + id).once("value").then(snapshot => {
  let data = snapshot.val();

  if(data){
    document.getElementById("info").innerHTML = `
      <p><strong>Nombre:</strong> ${data.nombre}</p>
      <p><strong>Tipo de sangre:</strong> ${data.sangre}</p>
      <p><strong>Alergias:</strong> ${data.alergias}</p>
    `;
  } else {
    document.getElementById("info").innerHTML = "⚠ No hay datos";
  }
});
</script>

</body>
</html>
