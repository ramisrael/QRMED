<!DOCTYPE html>
<html>
<head>
  <title>Registro Médico</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow-lg">

    <h2 class="text-center mb-4">🩺 Registro Médico</h2>

    <input id="nombre" class="form-control mb-2" placeholder="Nombre">
    <input id="sangre" class="form-control mb-2" placeholder="Tipo de sangre">
    <input id="alergias" class="form-control mb-2" placeholder="Alergias">

    <button class="btn btn-primary w-100" onclick="guardar()">Generar QR</button>

    <div class="text-center mt-4">
      <img id="qr">
    </div>

  </div>
</div>

<!-- Firebase (VERSIÓN COMPATIBLE) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// TU CONFIG YA PUESTA
const firebaseConfig = {
  apiKey: "AIzaSyDHrG-U9JEwo-AesKD6CCNDDgXZ_lB3Z14",
  authDomain: "web-medica-49502.firebaseapp.com",
  databaseURL: "https://web-medica-49502-default-rtdb.firebaseio.com",
  projectId: "web-medica-49502",
  storageBucket: "web-medica-49502.firebasestorage.app",
  messagingSenderId: "297387802420",
  appId: "1:297387802420:web:c3afc54720d20ba44d6f61"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function guardar() {

  let data = {
    nombre: document.getElementById("nombre").value,
    sangre: document.getElementById("sangre").value,
    alergias: document.getElementById("alergias").value
  };

  let ref = db.ref("usuarios").push();
  ref.set(data);

  let id = ref.key;

  // ⚠️ POR AHORA LOCAL (luego lo cambiamos)
  let link = "perfil.html?id=" + id;

  let qrURL = "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" + encodeURIComponent(link);

  document.getElementById("qr").src = qrURL;
}
</script>

</body>
</html>
